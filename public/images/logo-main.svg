<svg width="180" height="160" viewBox="0 0 180 160" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="mtGradient" x1="20%" y1="100%" x2="80%" y2="0%">
      <stop offset="0%" stop-color="#6C2BD9"/>
      <stop offset="50%" stop-color="#805AF5"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- M Shape -->
  <g filter="url(#glow)">
    <!-- Left leg of M -->
    <path d="M30 105 L50 35" stroke="url(#mtGradient)" stroke-width="7" stroke-linecap="round"/>
    <!-- Left inner diagonal -->
    <path d="M50 35 L90 95" stroke="url(#mtGradient)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Right inner diagonal -->
    <path d="M90 95 L130 35" stroke="url(#mtGradient)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Right leg of M -->
    <path d="M130 35 L150 105" stroke="url(#mtGradient)" stroke-width="7" stroke-linecap="round"/>

    <!-- WiFi arc 1 - innermost -->
    <path d="M68 65 C78 55, 102 55, 112 65" stroke="url(#mtGradient)" stroke-width="5.5" stroke-linecap="round" fill="none"/>
    <!-- WiFi arc 2 - middle -->
    <path d="M55 48 C70 33, 110 33, 125 48" stroke="url(#mtGradient)" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.75"/>
    <!-- WiFi arc 3 - outer -->
    <path d="M43 33 C63 13, 117 13, 137 33" stroke="url(#mtGradient)" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.45"/>
  </g>

  <!-- MarketingTool text -->
  <text x="90" y="140" text-anchor="middle" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="600" letter-spacing="1.5" fill="#A78BFA">
    MarketingTool
  </text>
</svg>
